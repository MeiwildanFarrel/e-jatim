openapi: 3.0.3
info:
  title: E-Jatim TrustLink — Mock SNAP BI Reference API
  description: >
    Spesifikasi mock API bergaya SNAP BI (Standar Nasional Open API Pembayaran),
    disusun mengacu pada struktur resmi SNAP BI (SK Gubernur BI No. 23/10/KEP.GBI/2021
    dan PADG No. 23/15/PADG/2021). Dokumen ini merepresentasikan endpoint
    account-inquiry dan transaction-history (tag `snap-bi-standard`) untuk keperluan
    Proof of Concept (PoC) E-Jatim TrustLink — BUKAN koneksi produksi ke Penyelenggara
    Jasa Pembayaran (PJP) berlisensi. Struktur field dan header divalidasi berdasarkan
    dokumentasi publik SNAP BI (BRI API Developer Portal, apidevportal.bi.go.id), namun
    nilai dan validasi signature pada PoC ini bersifat simulasi. Sejak 1 September 2023,
    pengelolaan operasional SNAP (termasuk publikasi dan pembaruan standar teknis)
    telah dialihkan Bank Indonesia kepada ASPI (Asosiasi Sistem Pembayaran Indonesia)
    sebagai Self-Regulatory Organization; perizinan PJP tetap kewenangan BI/OJK.

    Dokumen ini JUGA mendokumentasikan satu endpoint tambahan, /ingest (tag
    `internal-orchestration`), yang BUKAN bagian dari standar SNAP BI — endpoint
    itu murni orkestrasi internal sistem kita sendiri (mensimulasikan proses
    tarikan malam hari dari SNAP ke database internal). Lihat deskripsi tag
    masing-masing di bawah untuk pembeda yang eksplisit.
  version: "0.1.0-poc"
  contact:
    name: E-Jatim TrustLink Team — Anggota A (Tech Lead)
servers:
  - url: https://e-jatim.vercel.app/api/mock-snap
    description: Mock server (PoC) — bukan endpoint produksi SNAP BI

tags:
  - name: snap-bi-standard
    description: >
      Endpoint yang MEREPRESENTASIKAN struktur resmi SNAP BI (bentuk
      request/response, header wajib X-TIMESTAMP/X-SIGNATURE/dst mengikuti
      pola PJP asli). Kalau nanti terhubung ke PJP berlisensi sungguhan,
      endpoint-endpoint inilah yang punya padanan resmi di sisi SNAP BI.
  - name: internal-orchestration
    description: >
      Endpoint BUKAN bagian dari standar SNAP BI — tidak punya padanan di
      spesifikasi resmi BI/ASPI. Ini murni orkestrasi INTERNAL milik sistem
      E-Jatim TrustLink sendiri, yang di baliknya memanggil endpoint
      snap-bi-standard di atas. Dipisahkan tag-nya secara sengaja supaya
      tidak disalahartikan sebagai bagian dari standar SNAP BI saat dibaca
      untuk paper/dokumentasi kepatuhan.

paths:
  /account-inquiry:
    post:
      tags: [snap-bi-standard]
      summary: Account Inquiry (mock)
      description: >
        Mensimulasikan pengecekan validitas dan informasi dasar merchant QRIS UMKM,
        mengikuti pola request/response SNAP BI account-inquiry.
      operationId: accountInquiry
      parameters:
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
        - $ref: '#/components/parameters/XPartnerId'
        - $ref: '#/components/parameters/XExternalId'
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountInquiryRequest'
            example:
              partnerReferenceNo: "20260710000000000001"
              beneficiaryAccountNo: "QRIS-MOCK-001"
              additionalInfo:
                deviceId: "e-jatim-poc-device"
                channel: "web"
      responses:
        '200':
          description: Sukses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInquiryResponse'
              example:
                responseCode: "2001100"
                responseMessage: "Successful"
                referenceNo: "202607100000000001"
                partnerReferenceNo: "20260710000000000001"
                accountNo: "QRIS-MOCK-001"
                name: "Nasi Campur Bu Sari"
                additionalInfo:
                  accountType: "QRIS_MERCHANT"
                  status: "ACTIVE"
        '400':
          description: Permintaan tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                responseCode: "4001100"
                responseMessage: "Invalid Field Format"

  /transaction-history:
    post:
      tags: [snap-bi-standard]
      summary: Transaction History (mock)
      description: >
        Mensimulasikan penarikan riwayat transaksi QRIS/e-wallet UMKM dalam
        rentang waktu tertentu, mengikuti pola request/response SNAP BI
        (setara layanan bank statement / transaction history).
      operationId: transactionHistory
      parameters:
        - $ref: '#/components/parameters/XTimestamp'
        - $ref: '#/components/parameters/XSignature'
        - $ref: '#/components/parameters/XPartnerId'
        - $ref: '#/components/parameters/XExternalId'
        - $ref: '#/components/parameters/ChannelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionHistoryRequest'
            example:
              accountNo: "QRIS-MOCK-001"
              fromDateTime: "2026-07-01T00:00:00+07:00"
              toDateTime: "2026-07-10T23:59:59+07:00"
      responses:
        '200':
          description: Sukses
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionHistoryResponse'
              example:
                responseCode: "2001400"
                responseMessage: "Successful"
                referenceNo: "202607100000000002"
                totalCreditEntries:
                  numberOfEntries: "2"
                  amount:
                    value: "7300000.00"
                    currency: "IDR"
                totalDebitEntries:
                  numberOfEntries: "1"
                  amount:
                    value: "250000.00"
                    currency: "IDR"
                detailData:
                  - amount:
                      value: "3500000.00"
                      currency: "IDR"
                    transactionDate: "2026-07-04T09:12:00+07:00"
                    remark: "Pembayaran QRIS - Penjualan harian"
                    transactionId: "TRX-MOCK-0001"
                    type: "Credit"
                  - amount:
                      value: "250000.00"
                      currency: "IDR"
                    transactionDate: "2026-07-05T14:30:00+07:00"
                    remark: "Beli bahan baku sayur dan daging"
                    transactionId: "TRX-MOCK-0002"
                    type: "Debit"
        '400':
          description: Permintaan tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ingest:
    post:
      tags: [internal-orchestration]
      summary: "⚠️ Ingest transaksi ke database internal (BUKAN endpoint SNAP BI)"
      description: >
        **PENTING — endpoint ini TIDAK ADA padanannya di standar SNAP BI resmi.**
        Ini adalah endpoint orkestrasi INTERNAL milik E-Jatim TrustLink sendiri,
        yang mensimulasikan proses "server kita menarik data transaksi dari SNAP
        setiap malam" (batch nightly pull). Alurnya: endpoint ini memanggil
        /transaction-history (endpoint bergaya SNAP BI di atas) untuk 24 jam
        terakhir milik satu accountNo, lalu meng-insert hasilnya sebagai baris
        baru ke tabel `transactions` internal (status `pending`, menunggu
        klasifikasi Auto-Ledger Tier 1/2 lewat endpoint `/api/classify` yang
        terpisah). Endpoint account-inquiry dan transaction-history yang
        merepresentasikan struktur SNAP BI sesungguhnya — endpoint ini murni
        "lem" internal di sisi E-Jatim TrustLink, jangan dikutip sebagai bagian
        dari kepatuhan/struktur SNAP BI di paper.
      operationId: ingestNightlyPull
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [umkm_id, accountNo]
              properties:
                umkm_id:
                  type: string
                  format: uuid
                  description: ID UMKM di database internal E-Jatim TrustLink (bukan field standar SNAP BI)
                accountNo:
                  type: string
                  description: Nomor akun/merchant QRIS, diteruskan apa adanya ke /transaction-history
            example:
              umkm_id: "71d869df-7a97-4d29-af8c-40bc55f895bf"
              accountNo: "QRIS-MOCK-001"
      responses:
        '200':
          description: Sukses — transaksi 24 jam terakhir berhasil ditarik & disimpan
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  umkm_id:
                    type: string
                  accountNo:
                    type: string
                  period:
                    type: object
                    properties:
                      fromDateTime:
                        type: string
                        format: date-time
                      toDateTime:
                        type: string
                        format: date-time
                  fetched:
                    type: integer
                    description: Jumlah baris dari /transaction-history
                  inserted:
                    type: integer
                    description: Jumlah baris berhasil di-insert ke tabel transactions
                  transactions:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '400':
          description: Field umkm_id/accountNo tidak valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Gagal menarik data dari /transaction-history internal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Gagal insert ke database
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    XTimestamp:
      name: X-TIMESTAMP
      in: header
      required: true
      schema:
        type: string
        format: date-time
      description: Waktu request, format ISO 8601 dengan offset zona waktu
    XSignature:
      name: X-SIGNATURE
      in: header
      required: true
      schema:
        type: string
      description: >
        Tanda tangan digital request. Pada PoC ini nilai disimulasikan dan
        TIDAK divalidasi secara kriptografis nyata.
    XPartnerId:
      name: X-PARTNER-ID
      in: header
      required: true
      schema:
        type: string
      description: Identitas mitra (PJP/TPP) pemanggil API
    XExternalId:
      name: X-EXTERNAL-ID
      in: header
      required: true
      schema:
        type: string
      description: ID unik request untuk mencegah duplikasi (idempotency reference)
    ChannelId:
      name: CHANNEL-ID
      in: header
      required: true
      schema:
        type: string
      description: Kanal asal request, misal "web" atau "mobile"

  schemas:
    AccountInquiryRequest:
      type: object
      required: [partnerReferenceNo, beneficiaryAccountNo]
      properties:
        partnerReferenceNo:
          type: string
        beneficiaryAccountNo:
          type: string
        additionalInfo:
          type: object
          additionalProperties: true

    AccountInquiryResponse:
      type: object
      properties:
        responseCode:
          type: string
        responseMessage:
          type: string
        referenceNo:
          type: string
        partnerReferenceNo:
          type: string
        accountNo:
          type: string
        name:
          type: string
        additionalInfo:
          type: object
          additionalProperties: true

    TransactionHistoryRequest:
      type: object
      required: [accountNo, fromDateTime, toDateTime]
      properties:
        accountNo:
          type: string
        fromDateTime:
          type: string
          format: date-time
        toDateTime:
          type: string
          format: date-time

    TransactionHistoryResponse:
      type: object
      properties:
        responseCode:
          type: string
        responseMessage:
          type: string
        referenceNo:
          type: string
        totalCreditEntries:
          $ref: '#/components/schemas/EntrySummary'
        totalDebitEntries:
          $ref: '#/components/schemas/EntrySummary'
        detailData:
          type: array
          items:
            $ref: '#/components/schemas/TransactionDetail'

    EntrySummary:
      type: object
      properties:
        numberOfEntries:
          type: string
        amount:
          $ref: '#/components/schemas/Amount'

    TransactionDetail:
      type: object
      properties:
        amount:
          $ref: '#/components/schemas/Amount'
        transactionDate:
          type: string
          format: date-time
        remark:
          type: string
        transactionId:
          type: string
        type:
          type: string
          enum: [Credit, Debit]

    Amount:
      type: object
      properties:
        value:
          type: string
        currency:
          type: string
          example: IDR

    ErrorResponse:
      type: object
      properties:
        responseCode:
          type: string
        responseMessage:
          type: string
